services:
  sonarqube:
    image: sonarqube:community
    ports:
      - "9000:9000"
    environment:
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions

  jenkins:
    image: jenkins/jenkins:lts
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock

  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    ports:
      - "8081:8080"

  vulnerable-app:
    image: bkimminich/juice-shop
    ports:
      - "3000:3000"

  # Update docker-compose.yml defectdojo service
defectdojo:
  image: appthreat/defectdojo:latest
  ports:
    - "8082:8000"
  environment:
    DD_ALLOWED_HOSTS: "*"

  mysql:
    image: mysql:5.7
    environment:
      MYSQL_ROOT_PASSWORD: "dojo"
      MYSQL_DATABASE: "dojo"
      MYSQL_USER: "dojo"
      MYSQL_PASSWORD: "dojo"

volumes:
  sonarqube_data:
  sonarqube_extensions:
  jenkins_data:
